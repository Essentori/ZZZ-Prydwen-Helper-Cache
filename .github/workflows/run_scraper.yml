name: Auto Update ZZZ Data

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Puppeteer and Stealth dependencies
      run: |
        npm init -y
        npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

    - name: Run Node.js Puppeteer Scraper
      run: node scraper.js

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add characters.json
        
        if git diff-index --quiet HEAD --; then
          echo "No changes detected in characters.json. Skipping commit."
        else
          git commit -m "db: automated update of characters.json [skip ci]"
          git push origin main
        fi
